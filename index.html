<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTENDIFY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Smoke Background -->
    <div id="smoke-background" class="smoke-background"></div>
    
    <!-- Login Section -->
    <div id="login-section" class="login-section">
        <div class="login-container">
            <h1>ATTENDIFY</h1>
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Correo electrónico" required>
                <input type="password" id="login-password" placeholder="Contraseña" required>
                <button type="submit" class="login-btn">INICIAR SESIÓN</button>
            </form>
            <p id="login-error" class="error-message"></p>
        </div>
    </div>

    <!-- Main Content (hidden until logged in) -->
    <div id="main-content" class="container hidden">
        <header class="main-header">
            <a href="index.html" class="home-link">
                <svg class="home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Home</span>
            </a>
            <button id="logout-btn" class="logout-btn">CERRAR SESIÓN</button>
        </header>
        <h1>ATTENDIFY</h1>
        <div class="grid">
            <a href="materia.html?subject=matematicas" class="materia">MATEMÁTICAS</a>
            <a href="materia.html?subject=ingles" class="materia">ENGLISH</a>
            <a href="materia.html?subject=ciencias" class="materia">CIENCIAS NAT.</a>
            <a href="materia.html?subject=lectura" class="materia">LECTURA</a>
            <a href="materia.html?subject=ortografia" class="materia">ORTOGRAFÍA</a>
        </div>
        <footer>by: oscar henriquez</footer>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCwHs1FgL021Se5PH5T-dkZnnDRxYdZqXs",
            authDomain: "attendify-b59b7.firebaseapp.com",
            projectId: "attendify-b59b7",
            storageBucket: "attendify-b59b7.firebasestorage.app",
            messagingSenderId: "866459607875",
            appId: "1:866459607875:web:dcbce887d1b738a0ee85f6",
            measurementId: "G-TE3HVPWWTH"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Make auth and db available globally
        window.firebaseAuth = auth;
        window.firebaseDb = db;

        // Auth state observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorElement = document.getElementById('login-error');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                errorElement.textContent = '';
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    errorElement.textContent = 'Usuario no encontrado';
                } else if (error.code === 'auth/wrong-password') {
                    errorElement.textContent = 'Contraseña incorrecta';
                } else if (error.code === 'auth/user-disabled') {
                    errorElement.textContent = 'Cuenta inhabilitada. Contacte al administrador.';
                } else {
                    errorElement.textContent = 'Error al iniciar sesión: ' + error.message;
                }
            }
        });

        // Logout handler
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
        });

        // Smoke Background Animation
        const smokeBackground = document.getElementById('smoke-background');
        const particleCount = 15;
        const particles = [];
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let isOverInteractive = false;

        // Create smoke particles
        function createParticles() {
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'smoke-particle';
                
                const size = Math.random() * 300 + 200;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                
                smokeBackground.appendChild(particle);
                particles.push({
                    element: particle,
                    baseX: parseFloat(particle.style.left),
                    baseY: parseFloat(particle.style.top),
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        // Check if mouse is over interactive elements
        function checkInteractiveElements(e) {
            const interactiveElements = document.querySelectorAll('a, button, input, .container, .materia');
            isOverInteractive = false;
            
            interactiveElements.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right &&
                    e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    isOverInteractive = true;
                }
            });
        }

        // Mouse movement handler
        document.addEventListener('mousemove', (e) => {
            checkInteractiveElements(e);
            if (!isOverInteractive) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        // Animate particles
        function animateParticles() {
            particles.forEach(particle => {
                const dx = (mouseX - window.innerWidth / 2) * particle.speed * 0.1;
                const dy = (mouseY - window.innerHeight / 2) * particle.speed * 0.1;
                
                particle.element.style.transform = `translate(${dx}px, ${dy}px)`;
            });
            requestAnimationFrame(animateParticles);
        }

        // Initialize
        createParticles();
        animateParticles();

        // Firebase SDK
    </script>
</body>
</html>
